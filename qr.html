  <meta charset='UTF-8'>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1000px; height: 1000px;
      background: radial-gradient(ellipse at center, #3d1200 0%, #1a0800 50%, #0d0400 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
    }
    .card {
      width: 860px; height: 860px;
      background: linear-gradient(160deg, #2a0d00 0%, #1a0800 60%, #0d0400 100%);
      border-radius: 28px;
      border: 1px solid rgba(196,82,0,0.4);
      box-shadow: 0 0 60px rgba(196,82,0,0.2), 0 0 120px rgba(139,26,0,0.15), inset 0 1px 0 rgba(255,180,80,0.08);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 44px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(196,82,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .flame-icon {
      width: 60px; height: 60px;
      background: radial-gradient(circle at 50% 60%, #c45200 0%, #8b1a00 60%, #1a0800 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 20px rgba(196,82,0,0.5);
      position: relative; z-index: 1;
    }
    .divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, #c45200, transparent); }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: 44px; font-weight: 700;
      color: #FFF5E6; text-align: center; letter-spacing: 2px;
      line-height: 1.1; position: relative; z-index: 1;
      text-shadow: 0 0 30px rgba(196,82,0,0.4);
    }
    .title span { color: #c45200; }
    .subtitle {
      font-size: 12px; font-weight: 400; letter-spacing: 5px; text-transform: uppercase;
      color: rgba(255,245,230,0.6); text-align: center; position: relative; z-index: 1;
    }
    .qr-wrapper {
      background: #FFF5E6; border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(196,82,0,0.3);
      position: relative; z-index: 1;
    }
    .qr-wrapper img { display: block; width: 300px; height: 300px; }
    .scan-text {
      font-size: 12px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase;
      color: #c45200; text-align: center; position: relative; z-index: 1;
    }
    .address {
      font-size: 11.5px; color: rgba(255,245,230,0.45); text-align: center;
      letter-spacing: 0.5px; line-height: 2; position: relative; z-index: 1;
    }
    .address strong { color: rgba(255,245,230,0.7); font-weight: 500; }
  </style>
